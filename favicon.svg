<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1140"/>
      <stop offset="45%" stop-color="#5b2a86"/>
      <stop offset="78%" stop-color="#e85d75"/>
      <stop offset="100%" stop-color="#ff9a5a"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6cf"/>
      <stop offset="55%" stop-color="#ffd36e"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd36e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd36e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="512" height="512" fill="url(#sky)"/>
    <circle cx="256" cy="252" r="190" fill="url(#glow)"/>
    <circle cx="256" cy="252" r="108" fill="url(#sun)"/>

    <!-- skyline silhouette -->
    <g fill="#140a2b">
      <rect x="-10" y="372" width="92" height="150"/>
      <rect x="78"  y="312" width="70" height="210"/>
      <rect x="146" y="356" width="58" height="166"/>
      <rect x="202" y="284" width="64" height="238"/>
      <rect x="264" y="340" width="56" height="182"/>
      <rect x="318" y="300" width="74" height="222"/>
      <rect x="388" y="356" width="60" height="166"/>
      <rect x="444" y="330" width="80" height="192"/>
    </g>

    <!-- the runner, a neon spark on a rooftop -->
    <rect x="222" y="262" width="22" height="22" rx="5" fill="#7df9ff"/>
  </g>
</svg>
